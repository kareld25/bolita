<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolita Pro Elite</title>
    <style>
        :root { --gold: #fbbf24; --blue: #3b82f6; --dark: #0f172a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark); color: white; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .app-card { width: 100%; max-width: 400px; background: #1e293b; margin: 20px; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .header { background: linear-gradient(135deg, #1e3a8a, #1e293b); padding: 30px 20px; text-align: center; border-bottom: 4px solid var(--gold); }
        .header h1 { margin: 0; font-size: 1.8rem; letter-spacing: 2px; color: var(--gold); }
        .content { padding: 20px; }
        .btn-update { background: var(--gold); color: black; width: 100%; border: none; padding: 18px; border-radius: 16px; font-weight: 800; cursor: pointer; transition: all 0.3s; font-size: 1rem; text-transform: uppercase; margin-bottom: 20px; }
        .btn-update:active { transform: scale(0.95); }
        .result-item { display: flex; align-items: center; background: #2d3748; margin-bottom: 12px; padding: 15px; border-radius: 18px; animation: fadeIn 0.5s ease forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .ball { background: var(--blue); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: bold; box-shadow: inset -3px -3px 10px rgba(0,0,0,0.4), 0 5px 15px rgba(59,130,246,0.4); margin-right: 15px; }
        .stats { flex-grow: 1; }
        .stats .label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; }
        .stats .val { font-size: 1.1rem; font-weight: bold; color: var(--gold); }
        .loader { display: none; text-align: center; padding: 20px; color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>
    <div class="app-card">
        <div class="header">
            <h1>BOLITA PRO</h1>
            <small style="color: #94a3b8;">HISTORIAL TARDE (MIDDAY)</small>
        </div>
        <div class="content">
            <button class="btn-update" onclick="fetchData()">Sincronizar Datos</button>
            <div id="loader" class="loader">Buscando en Florida Lottery...</div>
            <div id="results"></div>
        </div>
    </div>

    <script>
        async function fetchData() {
            const resDiv = document.getElementById('results');
            const loader = document.getElementById('loader');
            loader.style.display = 'block';
            resDiv.innerHTML = '';

            try {
                const response = await fetch('/api');
                const data = await response.json();
                
                data.forEach((item, i) => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.style.animationDelay = (i * 0.1) + 's';
                    div.innerHTML = `
                        <div class="ball">${item.numero}</div>
                        <div class="stats">
                            <div class="label">${i === 0 ? 'Más Frecuente' : 'Posición ' + (i+1)}</div>
                            <div class="val">${item.apariciones} veces</div>
                        </div>
                    `;
                    resDiv.appendChild(div);
                });
            } catch (e) {
                resDiv.innerHTML = '<p style="color: #f87171; text-align:center;">Error de conexión. Revisa los logs de Vercel.</p>';
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
