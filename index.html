<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolita Pro Analyzer</title>
    <style>
        :root { --gold: #fbbf24; --accent: #3b82f6; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 420px; padding: 20px; }
        .app-card { background: var(--card); border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); overflow: hidden; border: 1px solid #334155; }
        .header { background: linear-gradient(135deg, #1e3a8a, #1e293b); padding: 30px 20px; text-align: center; border-bottom: 4px solid var(--gold); }
        .header h1 { margin: 0; font-size: 1.6rem; letter-spacing: 1.5px; color: var(--gold); text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .main { padding: 20px; }
        .btn { background: var(--gold); color: #000; width: 100%; border: none; padding: 18px; border-radius: 16px; font-weight: 800; cursor: pointer; font-size: 1rem; text-transform: uppercase; transition: 0.3s; margin-bottom: 20px; box-shadow: 0 4px 14px rgba(251, 191, 36, 0.3); }
        .btn:active { transform: scale(0.96); }
        .item { display: flex; align-items: center; background: #2d3748; margin-bottom: 12px; padding: 15px; border-radius: 20px; border: 1px solid #3d4b61; transition: 0.3s; }
        .ball { background: var(--accent); width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: bold; margin-right: 15px; box-shadow: inset -3px -3px 8px rgba(0,0,0,0.4); }
        .stats { flex-grow: 1; }
        .stats .rank { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .stats .count { font-size: 1.1rem; font-weight: bold; color: var(--gold); }
        .loading { display: none; text-align: center; padding: 20px; color: var(--gold); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-card">
            <div class="header">
                <h1>BOLITA DATA PRO</h1>
                <p style="margin:8px 0 0; color:#94a3b8; font-size:0.8rem">Sorteos Tarde (Midday) desde 2012</p>
            </div>
            <div class="main">
                <button class="btn" onclick="analizar()">Sincronizar y Analizar</button>
                <div id="loader" class="loading">Sincronizando con Florida Lottery...</div>
                <div id="results"></div>
            </div>
        </div>
    </div>

    <script>
        async function analizar() {
            const results = document.getElementById('results');
            const loader = document.getElementById('loader');
            loader.style.display = 'block';
            results.innerHTML = '';

            try {
                const res = await fetch('/api');
                const data = await res.json();
                
                data.forEach((item, i) => {
                    results.innerHTML += `
                        <div class="item">
                            <div class="ball">${item.numero}</div>
                            <div class="stats">
                                <div class="rank">${i === 0 ? '🔥 Más Repetido' : 'Puesto ' + (i+1)}</div>
                                <div class="count">${item.apariciones} veces</div>
                            </div>
                        </div>`;
                });
            } catch (e) {
                results.innerHTML = '<p style="color:#f87171; text-align:center;">Error de conexión.</p>';
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
