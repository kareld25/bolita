<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolita Florida Web</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 400px; background: #1e293b; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .header { text-align: center; border-bottom: 2px solid #fbbf24; padding-bottom: 15px; margin-bottom: 20px; }
        .btn { background: #fbbf24; color: black; width: 100%; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .row { display: flex; justify-content: space-between; align-items: center; background: #334155; margin: 10px 0; padding: 15px; border-radius: 12px; }
        .ball { background: #3b82f6; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .info { text-align: right; }
        .loader { text-align: center; display: none; color: #fbbf24; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h2 style="margin:0">BOLITA DATA PRO</h2>
            <small>Filtro: Tarde (2012-2026)</small>
        </div>
        <button class="btn" onclick="consultar()">ACTUALIZAR DESDE LA WEB</button>
        <div id="loader" class="loader"><p>Nutriendo datos oficiales...</p></div>
        <div id="results"></div>
    </div>

    <script>
        async function consultar() {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('results').innerHTML = '';
            try {
                const res = await fetch('/api');
                const data = await res.json();
                const container = document.getElementById('results');
                
                data.forEach((item, i) => {
                    container.innerHTML += `
                        <div class="row">
                            <div class="ball">${item.numero}</div>
                            <div class="info">
                                <div style="font-size:0.7em; color:#94a3b8">${i === 0 ? 'MÁS REPETIDO' : (i+1)+'° LUGAR'}</div>
                                <div style="font-weight:bold; color:#fbbf24">${item.apariciones} veces</div>
                            </div>
                        </div>`;
                });
            } catch (e) { alert("Error al conectar"); }
            document.getElementById('loader').style.display = 'none';
        }
    </script>
</body>
</html>
